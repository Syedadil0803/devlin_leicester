<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Button</title>

    <style>
        .btn {
            width: 150px;
            height: 40px;
            border: 0;
            border-radius: 5px;
            background: #db2a19;
            color: #fff;
            cursor: pointer;
        }

        .track {
            display: flex;
            width: 200%;
            height: 100%;
            transform: translateX(-50%);
            transition: transform .2s ease;
        }

        .label {
            width: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover .track {
            transform: translateX(0);
        }
    </style>
</head>

<body>
    <div>
        <button class="btn">
            <span class="track">
                <span class="label">WhatsApp Us</span>
                <span class="label">Contact Us</span>
            </span>
        </button>
    </div>
</body>

</html>
